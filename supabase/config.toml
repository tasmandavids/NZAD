# Olune — Supabase project config (CLI + GitHub integration).
# Docs: https://supabase.com/docs/guides/local-development/cli/config

project_id = "olune"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# Production remote — used by GitHub integration when merging to main.
# Dashboard: Project Settings → General → Reference ID
[remotes.production]
project_id = "wnoxcwihrzbxvogvmhqv"

# Auth hardening (local dev; mirror in Dashboard → Authentication for hosted).
# Leaked-password protection (HaveIBeenPwned) is Dashboard-only on hosted
# projects: Authentication → Providers → Email → Prevent use of leaked passwords.
[auth]
enabled = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true
